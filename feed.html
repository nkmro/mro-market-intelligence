<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRO 자재 시황 관리 시스템 - 피드</title>
<style>
  :root {
    --accent: #1a6b52;
    --accent-dark: #0f4a38;
    --accent-soft: #eaf3ef;
    --blue: #2f5fd0;
    --blue-dark: #1f3f96;
    --blue-soft: #e8eefc;
    --purple: #7c4fd0;
    --bg: #f6f5f2;
    --card: #ffffff;
    --border: #e2e0da;
    --text: #1f2320;
    --text-muted: #6b6f6a;
    --danger: #b3413a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 20px 12px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    z-index: 40;
  }
  .sidebar-title { font-size: 15px; font-weight: 700; margin: 4px 12px 18px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: 8px;
    font-size: 14px; color: var(--text-muted);
    cursor: pointer; margin-bottom: 2px;
  }
  .nav-item .ic { font-size: 15px; }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-dark); font-weight: 600; }
  .nav-item:hover:not(.active) { background: var(--bg); }
  .nav-badge {
    margin-left: auto; background: #e24b4a; color: #fff;
    font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
  }
  .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 10px; }
  .sidebar-me { font-size: 12px; color: var(--text-muted); padding: 6px 12px; }
  .sidebar-logout {
    font-size: 13px; color: var(--danger); cursor: pointer;
    padding: 8px 12px; border-radius: 8px;
  }
  .sidebar-logout:hover { background: var(--bg); }

  .drawer-overlay {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 30;
  }
  .drawer-overlay.open { display: block; }
  .hamburger {
    display: none;
    font-size: 20px; background: none; border: none; cursor: pointer;
    color: var(--text); padding: 4px 8px;
  }

  .content { flex: 1; min-width: 0; }

  .topbar {
display: flex; align-items: center; gap: 10px; justify-content: space-between;
padding: 16px 24px;
border-bottom: 1px solid var(--border);
background: var(--card);
position: sticky; top: 0; z-index: 25;
}
  .search-box {
display: flex; align-items: center; gap: 8px;
color: var(--text-muted); font-size: 14px;
flex: 1; max-width: 320px;
}
.search-box input {
border: none; outline: none; background: transparent;
font-size: 14px; color: var(--text); width: 100%; font-family: inherit;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-clear-btn {
background: none; border: none; color: var(--text-muted); cursor: pointer;
font-size: 13px; padding: 2px 4px; display: none;
}
.search-clear-btn.show { display: inline-block; }
  .team-select { font-size: 13px; color: var(--text-muted); cursor: pointer; }

  .main { padding: 20px 24px 60px; max-width: 760px; margin: 0; }

  .feed-empty, .feed-loading {
    text-align: center; color: var(--text-muted); font-size: 13px; padding: 60px 0;
  }

  .post-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    scroll-margin-top: 20px;
  }
  .post-card.flash { animation: flash-highlight 1.6s ease; }
.post-card.all-confirmed { background: var(--accent-soft); border-color: #b9d9cb; }
  @keyframes flash-highlight {
    0% { box-shadow: 0 0 0 3px var(--accent); }
    100% { box-shadow: none; }
  }
  .post-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .bot-icon {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0;
  }
  .bot-name { font-size: 11px; font-weight: 500; color: var(--text-muted); }
  .material-badge {
    font-size: 16px; font-weight: 700; color: var(--blue);
    background: var(--blue-soft); border: 1px solid #c9d9f7;
    padding: 3px 12px; border-radius: 20px;
  }
  .post-time { margin-left: auto; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .post-title { font-size: 16px; font-weight: 700; margin: 2px 0 6px; line-height: 1.4; }
  .post-summary { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }
  .article-link {
    font-size: 13px; color: var(--blue); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px;
  }
  .article-link:hover { text-decoration: underline; }

  .items-box { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .items-box-head {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px; font-size: 12px; color: var(--text-muted);
    background: var(--bg); border-bottom: 1px solid var(--border);
  }

  .item-row {
    display: grid; grid-template-columns: 1.3fr 1.3fr 1fr;
    align-items: center;
    padding: 12px 14px; font-size: 13px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--bg); }
  .item-row .customer { font-weight: 600; }
  .item-row .status { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .status-dot { font-size: 13px; }
  .status.checked .status-dot { color: var(--accent); }
  .status.unchecked .status-dot { color: #b8bcb8; }

  .comment-thread {
    display: none;
    background: #fbfaf7;
    border-top: 1px dashed var(--border);
    padding: 14px;
  }
  .comment-thread.open { display: block; }
  .thread-empty { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }

  .comment-item { display: flex; gap: 8px; margin-bottom: 12px; }
  .comment-item.pending { opacity: 0.55; }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .role-담당 { background: var(--accent); }
  .role-팀장 { background: var(--blue); }
  .role-임원 { background: var(--purple); }
  .comment-body { flex: 1; min-width: 0; }
  .reply-to { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .comment-head { font-size: 12px; margin-bottom: 2px; }
  .comment-head .name { font-weight: 700; color: var(--text); }
  .comment-head .role { color: var(--text-muted); margin-left: 4px; }
  .comment-head .time { color: var(--text-muted); margin-left: 6px; }
  .comment-text { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; }
  .comment-reply-btn {
    font-size: 11px; color: var(--blue); background: none; border: none;
    cursor: pointer; padding: 4px 0; margin-top: 2px;
  }
  .comment-actions { display: flex; gap: 12px; margin-top: 2px; }
  .comment-actions button { margin-top: 0; }
  .comment-edit-btn {
    font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 4px 0;
  }
  .comment-delete-btn {
    font-size: 11px; color: var(--danger); background: none; border: none; cursor: pointer; padding: 4px 0;
  }
  .edit-composer { margin-top: 4px; }
  .edit-composer textarea {
    width: 100%; resize: none; font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: #fff; min-height: 40px; margin-bottom: 6px;
  }
  .edit-composer .edit-actions { display: flex; gap: 8px; }
  .edit-composer button {
    border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .edit-composer .save-btn { background: var(--accent); color: #fff; }
  .edit-composer .cancel-btn { background: var(--bg); color: var(--text-muted); }

  .reply-composer { margin-top: 10px; display: flex; gap: 8px; }
  .reply-composer textarea {
    flex: 1; resize: none; font-family: inherit; font-size: 13px;
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    background: #fff; min-height: 40px;
  }
  .reply-composer button {
    border: none; background: var(--accent); color: #fff;
    border-radius: 8px; padding: 0 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .reply-composer button:disabled { background: #b8bcb8; cursor: not-allowed; }

  .feed-load-more-btn {
    display: block; width: 100%; margin: 12px 0 24px;
    border: 1px solid var(--border); background: var(--card); color: var(--text-muted);
    border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .feed-load-more-btn:disabled { color: #b8bcb8; cursor: not-allowed; }

  .first-comment-btn {
    border: 1px solid var(--accent); color: var(--accent); background: #fff;
    border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .first-comment-form { margin-top: 8px; }
  .thread-error { font-size: 12px; color: var(--danger); margin-top: 6px; }

  .notif-panel { border: 1px solid var(--border); border-radius: 12px; background: var(--card); overflow: hidden; }
  .notif-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: var(--bg); }
  .notif-item .flex1 { flex: 1; min-width: 0; }
  .notif-item .top-line { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .notif-item .headline { font-size: 14px; font-weight: 600; }
  .notif-empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 13px; }
  .notif-section-title {
    padding: 10px 16px; font-size: 12px; font-weight: 700; color: var(--text-muted);
    background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .notif-group-title { font-size: 13px; font-weight: 600; color: var(--text-muted); padding: 14px 4px 6px; }
.notif-post-card { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .notif-post-card:last-child { border-bottom: none; }
  .notif-post-card .top-line { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .notif-post-card .headline { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .notif-reply-list { display: flex; flex-direction: column; gap: 6px; }
  .notif-reply-row {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; background: var(--bg);
  }
  .notif-reply-row:hover { background: var(--accent-soft); }
  .notif-reply-row .top-line { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
  .notif-reply-prev { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
  .notif-reply-curr { font-size: 12px; color: var(--text); font-weight: 500; }

  .items-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; }
.items-toolbar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; }
.item-new-btn { border: none; background: var(--accent); color: #fff; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
.items-table-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.items-table th { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; white-space: nowrap; }
.items-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.items-table tbody tr { cursor: pointer; }
.items-table tbody tr:hover { background: var(--accent-soft); }
.item-status-badge { padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.item-status-badge.active { background: #e3f3e9; color: #1e8449; }
.item-status-badge.inactive { background: #f1f1f1; color: #888; }
.item-form-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; }
.item-form-card { background: #fff; border-radius: 12px; padding: 24px; width: 420px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
.item-form-head { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.team-lead-badge { background: #fdece9; color: #d35233; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; }
.form-group { margin-bottom: 16px; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
.form-input { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
.form-input:disabled { background: #f5f5f5; color: var(--text-muted); }
.customer-search-wrap { position: relative; }
.customer-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 6px; margin-top: 4px; max-height: 180px; overflow-y: auto; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
.customer-suggestion-item { padding: 8px 11px; font-size: 13px; cursor: pointer; }
.customer-suggestion-item:hover { background: var(--accent-soft); }
.customer-suggestion-item.add-new { color: var(--accent); font-weight: 600; border-top: 1px solid var(--border); }
.material-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 28px; }
.material-tag { background: var(--accent-soft); color: var(--text); border-radius: 14px; padding: 4px 10px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
.material-tag-remove { cursor: pointer; color: var(--text-muted); font-weight: 700; }
.ai-suggest-btn { border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.item-form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.btn-secondary { border: 1px solid var(--border); background: #fff; border-radius: 6px; padding: 9px 18px; font-size: 13px; cursor: pointer; }
.btn-primary { border: none; background: var(--text); color: #fff; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }

.user-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 8px; }
.user-row select, .user-row input[type="text"] {
font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: #fff;
}
.user-row input[type="text"] { width: 110px; }
.user-save-btn {
border: none; background: var(--accent); color: #fff; border-radius: 6px;
padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.user-save-btn:disabled { background: #b8bcb8; cursor: not-allowed; }
.user-save-msg { font-size: 12px; color: var(--text-muted); }

@media (max-width: 768px) {
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      transform: translateX(-100%);
      transition: transform .2s ease;
      box-shadow: 2px 0 12px rgba(0,0,0,.12);
    }
    .sidebar.open { transform: translateX(0); }
    .hamburger { display: inline-block; }
    .main { padding: 16px 14px 60px; }
    .topbar { padding: 12px 14px; }
    .item-row { grid-template-columns: 1fr; gap: 4px; }
    .item-row .status { justify-content: flex-start; }
  }
</style>
</head>
<body>

<div class="drawer-overlay" id="drawer-overlay" onclick="toggleDrawer(false)"></div>

<div class="shell">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">MRO 시황</div>
    <div class="nav-item active" data-view="feed" onclick="switchView('feed')"><span class="ic">🏠</span> 피드</div>
    <div class="nav-item" data-view="notif" onclick="switchView('notif')"><span class="ic">🔔</span> 알림<span class="nav-badge" id="notif-badge" style="display:none;">0</span></div>
    <div class="nav-item" id="nav-items" data-view="items" onclick="switchView('items')" style="display:none;"><span class="ic">📦</span> 품목 관리</div>
    <div class="nav-item" id="nav-users" data-view="users" onclick="switchView('users')" style="display:none;"><span class="ic">👥</span> 사용자 현황</div>
    <div class="nav-item"><span class="ic">⚙️</span> 설정</div>
    <div class="sidebar-bottom">
      <div class="sidebar-me" id="sidebar-me"></div>
      <div class="sidebar-logout" onclick="doLogout()">🚪 로그아웃</div>
    </div>
  </div>

  <div class="content">
    <div class="topbar">
      <button class="hamburger" onclick="toggleDrawer(true)">☰</button>
      <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="품목, 원자재 검색" oninput="handleSearchInput()"><button class="search-clear-btn" id="search-clear-btn" onclick="clearSearch()">✕</button></div>
      <div class="team-select" id="team-label">동부팀 전체</div>
    </div>

    <div class="main">
      <div id="feed-view">
        <div id="feed-root">
          <div class="feed-loading" id="feed-loading">불러오는 중...</div>
        </div>
      </div>
      <div id="notif-view" style="display:none;"></div>
<div id="users-view" style="display:none;"></div>
<div id="items-view" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby8ah2Ny5xtp0TMJd093KEsnNZkCItIOsHCoRNFdoOyjnUw4brP7vc28PAeccJms0rh/exec';
const ADMIN_EMAIL = 'jhjoo@nkmro.com';

let session = null;
let feedState = { posts: [], nextCursor: 0, loadingMore: false };
const threadState = {};
const postComments = {};

function getSession() {
  const raw = localStorage.getItem('mro_session');
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}

async function callApi(action, body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ action, sessionToken: session ? session.sessionToken : null }, body))
  });
  return res.json();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function truncate(str, maxLen) {
str = String(str || '');
return str.length > maxLen ? str.slice(0, maxLen) + '…' : str;
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  if (sameDay) return `오늘 ${hh}:${mm}`;
  return `${d.getMonth() + 1}.${d.getDate()} ${hh}:${mm}`;
}

function initials(name) {
  if (!name) return '?';
  return name.trim().slice(-2);
}

function toggleDrawer(open) {
  document.getElementById('sidebar').classList.toggle('open', open);
  document.getElementById('drawer-overlay').classList.toggle('open', open);
}

function switchView(view) {
document.querySelectorAll('.nav-item[data-view]').forEach(el => {
el.classList.toggle('active', el.dataset.view === view);
});
document.getElementById('feed-view').style.display = view === 'feed' ? 'block' : 'none';
document.getElementById('notif-view').style.display = view === 'notif' ? 'block' : 'none';
document.getElementById('users-view').style.display = view === 'users' ? 'block' : 'none';
document.getElementById('items-view').style.display = view === 'items' ? 'block' : 'none';
if (view === 'notif') {
renderNotif();
callApi('markChecked', {}).catch(() => {});
}
if (view === 'users') {
loadUsers();
}
if (view === 'items') {
loadItems();
}
toggleDrawer(false);
}

  function teamLabel(team) {
    return team === '본사' ? team : (team + '팀');
  }

(async function init() {
session = getSession();
if (!session || !session.sessionToken) {
window.location.href = 'index.html';
return;
}
document.getElementById('team-label').textContent = teamLabel(session.team || '') + ' 전체';
document.getElementById('sidebar-me').textContent = '👤 ' + (session.name || '') + ' ' + (session.role || '');
if (session.email === ADMIN_EMAIL) {
document.getElementById('nav-users').style.display = 'flex';
}
if (session.role === '팀장' || session.email === ADMIN_EMAIL) {
document.getElementById('nav-items').style.display = 'flex';
}
await loadFeed();
await loadIdleTimeoutSetting();
await loadThreadSeenMap();
startPolling();
setupIdleTimer();
})();

const itemCommentCounts = {};

function primeCommentsFromFeed(posts) {
  // A. 댓글 예열: getFeed가 이미 품목별 comments를 실어보내므로, 스레드를 열 때마다
  // getComments를 다시 호출하지 않도록 postComments 캐시를 미리 채워둔다.
  // B. 폴링 비교용으로 품목별 commentCount도 같이 기록해둔다.
  (posts || []).forEach(function (post) {
    let merged = [];
    (post.items || []).forEach(function (it) {
      itemCommentCounts[post.id + '-' + it.itemId] = it.commentCount || 0;
      if (it.comments && it.comments.length) merged = merged.concat(it.comments);
    });
    postComments[post.id] = { loaded: true, comments: merged };
  });
}

let pollTimer = null;
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(pollForUpdates, 30000);
}

async function pollForUpdates() {
try {
const res = await callApi('pollSignal', {});
if (!res.ok) {
if (res.error === 'SESSION_EXPIRED' || res.error === 'UNAUTHORIZED') {
doLogout();
}
return;
}
feedState.totalNeedsAttention = res.totalNeedsAttention || 0;
updateNotifBadge();

const postsToRefresh = new Set();
(res.signatures || []).forEach(function (sig) {
const key = sig.postId + '-' + sig.itemId;
const known = itemCommentCounts[key];
if (known === undefined) return;
if (known !== sig.commentCount) postsToRefresh.add(sig.postId);
});

for (const postId of postsToRefresh) {
await loadComments(postId);
const pc = postComments[postId];
if (pc && pc.comments) {
const counts = {};
pc.comments.forEach(function (c) { counts[c.itemId] = (counts[c.itemId] || 0) + 1; });
Object.keys(counts).forEach(function (itemId) {
itemCommentCounts[postId + '-' + itemId] = counts[itemId];
});
}
Object.keys(threadState).forEach(function (key) {
if (key.indexOf(postId + '-') === 0 && threadState[key].open) {
const itemId = key.slice((postId + '-').length);
renderThread(postId, itemId);
}
});
}
} catch (e) {
// 조용히 실패, 다음 주기에 재시도
}
}

async function loadFeed() {
  const root = document.getElementById('feed-root');
  try {
    const res = await callApi('getFeed', { cursor: 0 });
    if (!res.ok) {
      if (res.error === 'SESSION_EXPIRED' || res.error === 'UNAUTHORIZED') {
        doLogout();
        return;
      }
      root.innerHTML = `<div class="feed-empty">피드를 불러오지 못했어요. (${escapeHtml(res.error || 'SERVER_ERROR')})</div>`;
      return;
    }
    feedState.posts = res.posts || [];
    primeCommentsFromFeed(res.posts || []);
    feedState.nextCursor = res.nextCursor; feedState.totalNeedsAttention = res.totalNeedsAttention || 0;
    renderFeed();
    updateNotifBadge();
  } catch (e) {
    root.innerHTML = `<div class="feed-empty">네트워크 오류가 발생했어요. 새로고침 후 다시 시도해주세요.</div>`;
  }
}

async function loadMoreFeed() {
  if (feedState.loadingMore || feedState.nextCursor === null || feedState.nextCursor === undefined) return;
  feedState.loadingMore = true;
  renderLoadMoreButton();
  try {
    const res = await callApi('getFeed', { cursor: feedState.nextCursor });
    if (!res.ok) {
      if (res.error === 'SESSION_EXPIRED' || res.error === 'UNAUTHORIZED') {
        doLogout();
        return;
      }
      feedState.loadingMore = false;
      renderLoadMoreButton();
      return;
    }
    feedState.posts = feedState.posts.concat(res.posts || []);
    primeCommentsFromFeed(res.posts || []);
    feedState.nextCursor = res.nextCursor; feedState.totalNeedsAttention = res.totalNeedsAttention || 0;
    feedState.loadingMore = false;
    renderFeed();
    updateNotifBadge();
  } catch (e) {
    feedState.loadingMore = false;
    renderLoadMoreButton();
  }
}

function renderLoadMoreButton() {
  const el = document.getElementById('feed-load-more');
  if (!el) return;
  if (feedState.nextCursor === null || feedState.nextCursor === undefined) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  el.disabled = feedState.loadingMore;
  el.textContent = feedState.loadingMore ? '불러오는 중...' : '더보기';
}

function updateNotifBadge() {
  const count = feedState.totalNeedsAttention || 0;
  const badge = document.getElementById('notif-badge');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// 6-5: 검색 기능 (현재 로드된 피드 안에서 클라이언트 사이드 필터링)
function matchesSearch(post, query) {
if ((post.materialName || '').toLowerCase().includes(query)) return true;
return (post.items || []).some(function (it) {
return (it.customer || '').toLowerCase().includes(query) || (it.itemName || '').toLowerCase().includes(query);
});
}

function handleSearchInput() {
const input = document.getElementById('search-input');
const clearBtn = document.getElementById('search-clear-btn');
feedState.searchQuery = input.value;
clearBtn.classList.toggle('show', !!input.value);
if (document.getElementById('feed-view').style.display !== 'none') {
renderFeed();
}
}

function clearSearch() {
const input = document.getElementById('search-input');
input.value = '';
feedState.searchQuery = '';
document.getElementById('search-clear-btn').classList.remove('show');
renderFeed();
input.focus();
}

function renderFeed() {
const root = document.getElementById('feed-root');
if (!feedState.posts.length) {
root.innerHTML = `<div class="feed-empty">아직 게시된 시황이 없어요.</div>`;
return;
}
const query = (feedState.searchQuery || '').trim().toLowerCase();
const list = query ? feedState.posts.filter(function (p) { return matchesSearch(p, query); }) : feedState.posts;
if (query && !list.length) {
root.innerHTML = `<div class="feed-empty">"${escapeHtml(feedState.searchQuery)}"에 대한 검색 결과가 없어요.</div>`;
return;
}
const hasMore = !query && feedState.nextCursor !== null && feedState.nextCursor !== undefined;
root.innerHTML = list.map(renderPost).join('') +
(hasMore ? `<button id="feed-load-more" class="feed-load-more-btn" onclick="loadMoreFeed()">더보기</button>` : '');
}

function renderNotif() {
const root = document.getElementById('notif-view');

const newPosts = feedState.posts.filter(function (p) {
return p.needsAttention && (p.items || []).some(function (it) { return !it.confirmed; });
});

const replyEntries = [];
feedState.posts.forEach(function (p) {
const unreadItems = (p.items || []).filter(function (it) { return hasUnreadReply(p.id, it); });
if (unreadItems.length) replyEntries.push({ post: p, items: unreadItems });
});

if (!newPosts.length && !replyEntries.length) {
root.innerHTML = `<div class="notif-panel"><div class="notif-empty">아직 확인할 알림이 없어요.</div></div>`;
return;
}

function renderGroup(title, count, html) {
if (!count) return '';
return `<div class="notif-group-title">${title} ${count}건</div>${html}`;
}

const newPostsHtml = newPosts.map(function (p) {
return `
<div class="notif-item" onclick="goToItem('${p.id}')">
<div class="flex1">
<div class="top-line"><span class="material-badge" style="font-size:11px;padding:1px 8px;">${escapeHtml(p.materialName || '')}</span> ${escapeHtml(fmtTime(p.createdAt))}</div>
<div class="headline">${escapeHtml(truncate(p.title || p.summary || '', 36))}</div>
</div>
</div>
`;
}).join('');

const replyPostsHtml = replyEntries.map(function (entry) {
const p = entry.post;
const rowsHtml = entry.items.map(function (it) {
const comments = (it.comments || []).slice().sort(function (a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });
const prev = comments.length >= 2 ? comments[comments.length - 2] : null;
const curr = comments.length >= 1 ? comments[comments.length - 1] : null;
return `
<div class="notif-reply-row" onclick="goToItem('${p.id}', '${it.itemId}')">
<div class="top-line">${escapeHtml(it.customer || '')} · ${escapeHtml(it.itemName || '')} · ${escapeHtml(it.manager || '')}</div>
${prev ? `<div class="notif-reply-prev">이전 답글: ${escapeHtml(truncate(prev.content || '', 30))}</div>` : ''}
${curr ? `<div class="notif-reply-curr">현재 답글: ${escapeHtml(truncate(curr.content || '', 30))}</div>` : ''}
</div>
`;
}).join('');
return `
<div class="notif-post-card">
<div class="top-line"><span class="material-badge" style="font-size:11px;padding:1px 8px;">${escapeHtml(p.materialName || '')}</span> ${escapeHtml(fmtTime(p.createdAt))}</div>
<div class="headline">${escapeHtml(truncate(p.title || p.summary || '', 36))}</div>
<div class="notif-reply-list">${rowsHtml}</div>
</div>
`;
}).join('');

root.innerHTML = `<div class="notif-panel">${renderGroup('새 게시물', newPosts.length, newPostsHtml)}${renderGroup('확인 완료 · 댓글 필요', replyEntries.length, replyPostsHtml)}</div>`;
}

function goToPost(postId) {
  switchView('feed');
  setTimeout(() => {
    const el = document.getElementById('post-' + postId);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 1600);
  }, 50);
}

// C. 알림함 "확인 완료 · 댓글 필요" 섹션 — 품목(스레드) 단위 클릭 타겟.
// 게시물로 스크롤한 뒤, 해당 품목 행으로 다시 스크롤하고 스레드가 닫혀있으면 열어준다.
function goToItem(postId, itemId) {
  switchView('feed');
  setTimeout(() => {
    const key = postId + '-' + itemId;
    const row = document.getElementById('row-' + key);
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.add('flash');
    setTimeout(() => row.classList.remove('flash'), 1600);
    const st = threadState[key] || (threadState[key] = { open: false, replyOpenFor: null });
    if (!st.open) toggleThread(postId, itemId);
  }, 50);
}

function renderPost(post) {
const items = post.items || [];
const itemsHtml = items.map(item => renderItemRow(post, item)).join('');
const allConfirmed = items.length > 0 && items.every(function (item) { return item.confirmed; });
return `
<div class="post-card${allConfirmed ? ' all-confirmed' : ''}" id="post-${post.id}">
<div class="post-head">
<div class="bot-icon">✨</div>
<span class="material-badge">${escapeHtml(post.materialName || '')}</span>
<div class="bot-name">AI 시황봇</div>
<span class="post-time">${escapeHtml(fmtTime(post.createdAt))}</span>
</div>
<div class="post-title">${escapeHtml(post.summary || '')}</div>
<div class="post-summary">${escapeHtml(post.title || '')}</div>
${post.link ? `<a class="article-link" href="${escapeHtml(post.link)}" target="_blank" rel="noopener">🔗 기사 원문 보기</a>` : ''}
<div class="items-box">
<div class="items-box-head">📊 이 원자재를 쓰는 품목 ${items.length}건 · 확인 ${post.confirmedCount || 0}/${post.totalCount || items.length}</div>
${itemsHtml}
</div>
</div>
`;
}

function renderItemRow(post, item) {
  const checked = !!item.confirmed;
  const key = post.id + '-' + item.itemId;
  return `
    <div>
      <div class="item-row" id="row-${key}" onclick="toggleThread('${post.id}', '${item.itemId}')">
        <div class="customer">${escapeHtml(item.customer || '')}</div>
        <div>${escapeHtml(item.itemName || '')}</div>
        <div class="status ${checked ? 'checked' : 'unchecked'}">
          <span class="status-dot">${checked ? '✓' : '○'}</span>
          <span>${escapeHtml(item.manager || '')}</span>
        </div>
      </div>
      <div class="comment-thread" id="thread-${key}"></div>
    </div>
  `;
}

async function toggleThread(postId, itemId) {
  const key = postId + '-' + itemId;
  const panel = document.getElementById('thread-' + key);
  const st = threadState[key] || (threadState[key] = { open: false, replyOpenFor: null });
  const item = findItem(postId, itemId);

  st.open = !st.open;
  panel.classList.toggle('open', st.open);
  if (!st.open) return;

  markThreadSeenLocal(postId, itemId);

  if (item && !item.confirmed) {
    renderThread(postId, itemId);
    return;
  }

  const pc = postComments[postId];
  if (!pc || !pc.loaded) {
    panel.innerHTML = `<div class="thread-empty">댓글 불러오는 중...</div>`;
    await loadComments(postId);
  }
  renderThread(postId, itemId);
}

function findItem(postId, itemId) {
  const post = findPost(postId);
  if (!post) return null;
  for (const item of (post.items || [])) {
    if (String(item.itemId) === String(itemId)) return item;
  }
  return null;
}

function findPost(postId) {
  return feedState.posts.find(p => String(p.id) === String(postId));
}

async function loadComments(postId) {
  try {
    const res = await callApi('getComments', { postId });
    if (!res.ok) {
      postComments[postId] = { loaded: true, comments: [], error: res.error };
      return;
    }
    postComments[postId] = { loaded: true, comments: res.comments || [] };
  } catch (e) {
    postComments[postId] = { loaded: true, comments: [], error: 'NETWORK_ERROR' };
  }
}

function canStartFirstComment(item) {
  if (!session || !item) return false;
  return session.role === '담당' && String(item.manager || '').trim() === String(session.name || '').trim();
}
function canReply() {
  return session && (session.role === '담당' || session.role === '팀장' || session.role === '임원');
}
function roleClass(role) {
  if (role === '담당') return 'role-담당';
  if (role === '팀장') return 'role-팀장';
  if (role === '임원') return 'role-임원';
  return 'role-담당';
}

function renderThread(postId, itemId) {
  const key = postId + '-' + itemId;
  const panel = document.getElementById('thread-' + key);
  const item = findItem(postId, itemId);
  const pc = postComments[postId] || { comments: [] };
  const comments = (pc.comments || []).filter(c => String(c.itemId) === String(itemId));

  if (pc.error) {
    panel.innerHTML = `<div class="thread-error">댓글을 불러오지 못했어요. (${escapeHtml(pc.error)})</div>`;
    return;
  }

  if (!comments.length) {
    const startBtn = canStartFirstComment(item)
      ? `<button class="first-comment-btn" onclick="openReplyBox('${postId}', '${itemId}', null)">첫 댓글 남기기</button>
         <div id="composer-${key}-root" class="first-comment-form"></div>`
      : '';
    panel.innerHTML = `<div class="thread-empty">아직 확인 댓글이 없어요.</div>${startBtn}`;
    return;
  }

  const byId = {}; comments.forEach(c => byId[c.commentId] = c);
  function depthOf(c) {
    let d = 0, cur = c;
    while (cur && cur.parentCommentId && byId[cur.parentCommentId]) { d++; cur = byId[cur.parentCommentId]; if (d > 8) break; }
    return d;
  }

  const html = comments.map(c => {
    const depth = depthOf(c);
    const parent = c.parentCommentId ? byId[c.parentCommentId] : null;
    const isMine = !!(session && session.email && c.authorEmail && String(c.authorEmail).toLowerCase() === String(session.email).toLowerCase());
    const replyBtn = canReply()
      ? `<button class="comment-reply-btn" onclick="openReplyBox('${postId}', '${itemId}', '${c.commentId}')">답장</button>`
      : '';
    const editBtn = isMine
      ? `<button class="comment-edit-btn" onclick="startEditComment('${postId}', '${itemId}', '${c.commentId}')">수정</button>`
      : '';
    const deleteBtn = isMine
      ? `<button class="comment-delete-btn" onclick="deleteCommentConfirm('${postId}', '${itemId}', '${c.commentId}')">삭제</button>`
      : '';
    return `
      <div class="comment-item${c.pending ? ' pending' : ''}${c.deleting ? ' pending' : ''}" style="margin-left:${depth * 24}px;">
        <div class="avatar ${roleClass(c.authorRole)}">${escapeHtml(initials(c.authorName))}</div>
        <div class="comment-body">
          ${parent ? `<div class="reply-to">↳ ${escapeHtml(parent.authorName)} ${escapeHtml(parent.authorRole || '')}에게 답장</div>` : ''}
          <div class="comment-head">
            <span class="role">${escapeHtml(c.authorRole || '')}</span>${!parent ? `<span class="role">· 최초 댓글</span>` : ''}<span class="time">· ${c.pending ? '전송 중...' : (c.deleting ? '삭제 중...' : escapeHtml(fmtTime(c.createdAt)))}</span>
          </div>
          <div class="comment-text" id="text-${c.commentId}">${escapeHtml(c.content)}</div>
          ${(c.pending || c.deleting) ? '' : `<div class="comment-actions">${replyBtn}${editBtn}${deleteBtn}</div>`}
          <div id="composer-${key}-${c.commentId}"></div>
        </div>
      </div>
    `;
  }).join('');

  panel.innerHTML = html;
}

function openReplyBox(postId, itemId, parentCommentId) {
  const key = postId + '-' + itemId;
  const st = threadState[key];
  if (st.replyOpenFor === (parentCommentId || 'root')) {
    st.replyOpenFor = null;
    renderThread(postId, itemId);
    return;
  }
  st.replyOpenFor = parentCommentId || 'root';
  renderThread(postId, itemId);

  const mountId = parentCommentId ? `composer-${key}-${parentCommentId}` : `composer-${key}-root`;
  const mount = document.getElementById(mountId);
  if (!mount) return;
  mount.innerHTML = `
    <div class="reply-composer">
      <textarea id="ta-${key}" placeholder="${parentCommentId ? '답장을 입력하세요' : '확인 내용을 입력하세요'}"></textarea>
      <button id="btn-send-${key}" onclick="submitComment('${postId}', '${itemId}', ${parentCommentId ? `'${parentCommentId}'` : 'null'})">등록</button>
    </div>
  `;
  document.getElementById('ta-' + key).focus();
}

async function submitComment(postId, itemId, parentCommentId) {
  const key = postId + '-' + itemId;
  const ta = document.getElementById('ta-' + key);
  const btn = document.getElementById('btn-send-' + key);
  const content = ta.value.trim();
  if (!content) { ta.focus(); return; }

  btn.disabled = true; btn.textContent = '등록 중...';

  const tempId = 'temp-' + Date.now();
  const optimisticComment = {
    commentId: tempId,
    postId: postId,
    itemId: itemId,
    authorEmail: session.email || '',
    authorName: session.name,
    authorRole: session.role,
    parentCommentId: parentCommentId || '',
    content: content,
    createdAt: new Date().toISOString(),
    pending: true
  };
  if (!postComments[postId]) postComments[postId] = { loaded: true, comments: [] };
  postComments[postId].comments = (postComments[postId].comments || []).concat([optimisticComment]);
  const st = threadState[key];
  st.replyOpenFor = null;
  renderThread(postId, itemId);

  try {
    const res = await callApi('postComment', { postId, itemId, content, parentCommentId });
    if (!res.ok) {
      postComments[postId].comments = postComments[postId].comments.filter(c => c.commentId !== tempId);
      renderThread(postId, itemId);
      alert(res.error === 'FORBIDDEN_VIEWER' ? '이 작업을 수행할 권한이 없어요.' : ('오류가 발생했어요 (' + res.error + ')'));
      btn.disabled = false; btn.textContent = '등록';
      return;
    }

    if (res.comments) {
      postComments[postId] = { loaded: true, comments: res.comments };
    }
    if (res.updatedPost) {
      const idx = feedState.posts.findIndex(p => String(p.id) === String(postId));
      if (idx !== -1) feedState.posts[idx] = res.updatedPost;
    }
    renderFeed();
    updateNotifBadge();

    renderThread(postId, itemId);
    const panel = document.getElementById('thread-' + key);
    if (panel) panel.classList.add('open');
    if (threadState[key]) threadState[key].open = true;
  } catch (e) {
    if (postComments[postId]) {
      postComments[postId].comments = postComments[postId].comments.filter(c => c.commentId !== tempId);
      renderThread(postId, itemId);
    }
    alert('네트워크 오류로 등록하지 못했어요.');
    btn.disabled = false; btn.textContent = '등록';
  }
}

// 5-8: 댓글 수정
function startEditComment(postId, itemId, commentId) {
  const textEl = document.getElementById('text-' + commentId);
  if (!textEl) return;
  const pc = postComments[postId];
  const comment = pc && pc.comments ? pc.comments.find(c => c.commentId === commentId) : null;
  if (!comment) return;

  textEl.dataset.original = textEl.innerHTML;
  textEl.innerHTML = `
    <div class="edit-composer">
      <textarea id="edit-ta-${commentId}">${escapeHtml(comment.content)}</textarea>
      <div class="edit-actions">
        <button id="edit-save-${commentId}" class="save-btn" onclick="submitEditComment('${postId}', '${itemId}', '${commentId}')">저장</button>
        <button class="cancel-btn" onclick="cancelEditComment('${commentId}')">취소</button>
      </div>
    </div>
  `;
  const ta = document.getElementById('edit-ta-' + commentId);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function cancelEditComment(commentId) {
  const textEl = document.getElementById('text-' + commentId);
  if (textEl && textEl.dataset.original) {
    textEl.innerHTML = textEl.dataset.original;
  }
}

async function submitEditComment(postId, itemId, commentId) {
  const ta = document.getElementById('edit-ta-' + commentId);
  const content = ta.value.trim();
  if (!content) { ta.focus(); return; }
  const btn = document.getElementById('edit-save-' + commentId); ta.disabled = true; if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const res = await callApi('updateComment', { commentId, content });
    if (!res.ok) {
      alert(res.error === 'FORBIDDEN_NOT_AUTHOR' ? '본인이 작성한 댓글만 수정할 수 있어요.' : ('수정하지 못했어요. (' + res.error + ')'));
      ta.disabled = false; if (btn) { btn.disabled = false; btn.textContent = '저장'; }
      return;
    }
    if (res.comments) { postComments[postId] = { loaded: true, comments: res.comments }; } if (res.updatedPost) { const idx = feedState.posts.findIndex(p => String(p.id) === String(postId)); if (idx !== -1) feedState.posts[idx] = res.updatedPost; } renderFeed(); updateNotifBadge();
    renderThread(postId, itemId);
    const panel = document.getElementById('thread-' + postId + '-' + itemId);
    if (panel) panel.classList.add('open');
  } catch (e) {
    alert('네트워크 오류로 수정하지 못했어요.');
    ta.disabled = false; if (btn) { btn.disabled = false; btn.textContent = '저장'; }
  }
}

// 5-8: 댓글 삭제
async function deleteCommentConfirm(postId, itemId, commentId) {
  if (!confirm('이 댓글을 삭제할까요? 되돌릴 수 없어요.')) return; const __pc = postComments[postId]; const __target = __pc && __pc.comments ? __pc.comments.find(c => c.commentId === commentId) : null; if (__target) { __target.deleting = true; renderThread(postId, itemId); }
  try {
    const res = await callApi('deleteComment', { commentId });
    if (!res.ok) {
      alert(res.error === 'FORBIDDEN_NOT_AUTHOR' ? '본인이 작성한 댓글만 삭제할 수 있어요.' : ('삭제하지 못했어요. (' + res.error + ')')); if (__target) { __target.deleting = false; renderThread(postId, itemId); }
      return;
    }
    if (res.comments) { postComments[postId] = { loaded: true, comments: res.comments }; } if (res.updatedPost) { const idx = feedState.posts.findIndex(p => String(p.id) === String(postId)); if (idx !== -1) feedState.posts[idx] = res.updatedPost; } renderFeed(); updateNotifBadge();
    
    renderThread(postId, itemId);
    const panel = document.getElementById('thread-' + postId + '-' + itemId);
    if (panel) panel.classList.add('open');
    if (threadState[postId + '-' + itemId]) threadState[postId + '-' + itemId].open = true;
  } catch (e) {
    alert('네트워크 오류로 삭제하지 못했어요.'); if (__target) { __target.deleting = false; renderThread(postId, itemId); }
  }
}

// ==== 사용자 현황 (관리자 전용) ====
const ROLE_OPTIONS = ['일반', '담당', '팀장', '임원'];
const TEAM_OPTIONS = ['동부', '서부', '중부', '영업지원', '소싱', '본사'];
const STATUS_OPTIONS = ['활성', '비활성'];
let usersState = { users: [], loaded: false };

async function loadUsers() {
const root = document.getElementById('users-view');
root.innerHTML = `<div class="feed-loading">불러오는 중...</div>`;
try {
const res = await callApi('getUsers', {});
if (!res.ok) {
root.innerHTML = `<div class="feed-empty">사용자 목록을 불러오지 못했어요. (${escapeHtml(res.error || 'SERVER_ERROR')})</div>`;
return;
}
usersState.users = res.users || [];
usersState.loaded = true;
renderUsers();
} catch (e) {
root.innerHTML = `<div class="feed-empty">네트워크 오류가 발생했어요.</div>`;
}
}

function renderUsers() {
const root = document.getElementById('users-view');
if (!usersState.users.length) {
root.innerHTML = `<div class="feed-empty">등록된 사용자가 없어요.</div>`;
return;
}
root.innerHTML = `<div class="notif-panel">${usersState.users.map(renderUserRow).join('')}</div>`;
}

function renderUserRow(u) {
const rk = 'u' + u.row;
return `
<div class="notif-item" style="cursor:default; align-items:flex-start;">
<div class="flex1">
<div class="top-line">${escapeHtml(u.email)}</div>
<div class="user-row">
<input type="text" id="name-${rk}" value="${escapeHtml(u.name || '')}" placeholder="이름">
<select id="role-${rk}">${ROLE_OPTIONS.map(r => `<option value="${r}" ${r === u.role ? 'selected' : ''}>${r}</option>`).join('')}</select>
<select id="team-${rk}">${TEAM_OPTIONS.map(t => `<option value="${t}" ${t === u.team ? 'selected' : ''}>${t}</option>`).join('')}</select>
<select id="status-${rk}">${STATUS_OPTIONS.map(s => `<option value="${s}" ${s === u.status ? 'selected' : ''}>${s}</option>`).join('')}</select>
<button class="user-save-btn" id="btn-${rk}" onclick="saveUserRow(${u.row})">저장</button>
<span class="user-save-msg" id="msg-${rk}"></span>
</div>
</div>
</div>
`;
}

async function saveUserRow(row) {
const rk = 'u' + row;
const nameEl = document.getElementById('name-' + rk);
const roleEl = document.getElementById('role-' + rk);
const teamEl = document.getElementById('team-' + rk);
const statusEl = document.getElementById('status-' + rk);
const btn = document.getElementById('btn-' + rk);
const msg = document.getElementById('msg-' + rk);
const name = nameEl.value.trim();
const role = roleEl.value;
const team = teamEl.value;
const status = statusEl.value;
btn.disabled = true;
msg.textContent = '저장 중...';
try {
const res = await callApi('updateUser', { row, name, role, team, status });
if (!res.ok) {
msg.textContent = '실패: ' + (res.error || 'SERVER_ERROR');
btn.disabled = false;
return;
}
msg.textContent = '저장됨 ✓';
btn.disabled = false;
const u = usersState.users.find(x => x.row === row);
if (u) { u.name = name; u.role = role; u.team = team; u.status = status; }
setTimeout(() => { const m = document.getElementById('msg-' + rk); if (m) m.textContent = ''; }, 2000);
} catch (e) {
msg.textContent = '네트워크 오류';
btn.disabled = false;
}
}

// 자동 로그아웃: 30분 무활동 시 자동 로그아웃
let IDLE_TIMEOUT_MS = 30 * 60 * 1000;
let idleTimeoutMinutes = 30;

async function loadIdleTimeoutSetting() {
try {
const res = await callApi('getSettings', {});
if (res.ok && res.settings && res.settings['무활동로그아웃분'] !== undefined) {
const minutes = Number(res.settings['무활동로그아웃분']);
if (minutes > 0) {
idleTimeoutMinutes = minutes;
IDLE_TIMEOUT_MS = minutes * 60 * 1000;
}
}
} catch (e) {
// 설정값을 못 읽어오면 기본값(30분) 사용
}
}
let idleTimer = null;

// 6-4: 알림함 "댓글 필요" 정확도 개선 - 참여한 스레드의 미확인 답글만 표시
let threadSeenMap = {};

async function loadThreadSeenMap() {
try {
const res = await callApi('getThreadSeen', {});
if (res.ok && res.seenMap) threadSeenMap = res.seenMap;
} catch (e) {
// 못 읽어오면 빈 맵(기본값)으로 계속 진행
}
}

function hasUnreadReply(postId, item) {
const comments = item.comments || [];
if (!comments.length) return false;
const participant = comments.some(function (c) { return c.authorEmail === session.email; });
if (!participant) return false;
const sorted = comments.slice().sort(function (a, b) { return new Date(a.createdAt) - new Date(b.createdAt); });
const last = sorted[sorted.length - 1];
if (last.authorEmail === session.email) return false;
const key = postId + '-' + item.itemId;
const seenAt = threadSeenMap[key];
if (!seenAt) return true;
return new Date(last.createdAt) > new Date(seenAt);
}

function markThreadSeenLocal(postId, itemId) {
const key = postId + '-' + itemId;
threadSeenMap[key] = new Date().toISOString();
callApi('markThreadSeen', { postId: postId, itemId: itemId }).catch(function () {});
}


function resetIdleTimer() {
if (idleTimer) clearTimeout(idleTimer);
idleTimer = setTimeout(function () {
alert(idleTimeoutMinutes + '분 동안 활동이 없어 자동 로그아웃되었습니다.');
doLogout();
}, IDLE_TIMEOUT_MS);
}

function setupIdleTimer() {
['click', 'keydown', 'mousemove', 'scroll', 'touchstart'].forEach(function (evt) {
document.addEventListener(evt, resetIdleTimer, { passive: true });
});
resetIdleTimer();
}

// ==== 품목 관리 (팀장 전용) ====
let itemsState = { items: [], customers: [], teamUsers: [], loaded: false, filterTeam: '', editingItemId: null, selectedMaterials: [] };

async function loadItems() {
const root = document.getElementById('items-view');
root.innerHTML = `<div class="feed-loading">불러오는 중...</div>`;
try {
const results = await Promise.all([
callApi('getItems', {}),
callApi('getCustomers', {}),
callApi('getUsers', {})
]);
const itemsRes = results[0], customersRes = results[1], usersRes = results[2];
if (!itemsRes.ok) {
root.innerHTML = `<div class="feed-empty">품목 목록을 불러오지 못했어요. (${escapeHtml(itemsRes.error || 'SERVER_ERROR')})</div>`;
return;
}
itemsState.items = itemsRes.items || [];
itemsState.customers = customersRes.ok ? (customersRes.customers || []) : [];
itemsState.teamUsers = usersRes.ok ? (usersRes.users || []).filter(function (u) { return u.team === session.team && u.status === '활성'; }) : [];
itemsState.loaded = true;
renderItemsView();
} catch (e) {
root.innerHTML = `<div class="feed-empty">네트워크 오류가 발생했어요.</div>`;
}
}

function renderItemsView() {
const root = document.getElementById('items-view');
const filter = itemsState.filterTeam;
const teams = Array.from(new Set(itemsState.items.map(function (it) { return it.team; }).filter(Boolean)));
const list = filter ? itemsState.items.filter(function (it) { return it.team === filter; }) : itemsState.items;
root.innerHTML = `
<div class="items-toolbar">
<select id="items-team-filter" onchange="onItemsTeamFilterChange()">
<option value="">전체 팀</option>
${teams.map(function (t) { return `<option value="${escapeHtml(t)}" ${t === filter ? 'selected' : ''}>${escapeHtml(t)}</option>`; }).join('')}
</select>
<button class="item-new-btn" onclick="openItemForm(null)">+ 신규 등록</button>
</div>
<div class="items-table-wrap">
<table class="items-table">
<thead><tr><th>고객사</th><th>품목명</th><th>담당</th><th>팀</th><th>원자재</th><th>상태</th></tr></thead>
<tbody>
${list.map(function (it) {
return `<tr onclick="openItemForm('${it.itemId}')">
<td>${escapeHtml(it.customer || '')}</td>
<td>${escapeHtml(it.itemName || '')}</td>
<td>${escapeHtml(it.manager || '')}</td>
<td>${escapeHtml(it.team || '')}</td>
<td>${escapeHtml(it.materials || '')}</td>
<td><span class="item-status-badge ${it.status === '활성' ? 'active' : 'inactive'}">${escapeHtml(it.status || '')}</span></td>
</tr>`;
}).join('')}
</tbody>
</table>
${!list.length ? '<div class="feed-empty">등록된 품목이 없어요.</div>' : ''}
</div>
`;
}

function onItemsTeamFilterChange() {
itemsState.filterTeam = document.getElementById('items-team-filter').value;
renderItemsView();
}

function openItemForm(itemId) {
const item = itemId ? itemsState.items.find(function (it) { return it.itemId === itemId; }) : null;
itemsState.editingItemId = itemId;
itemsState.selectedMaterials = item && item.materials ? item.materials.split(',').map(function (s) { return s.trim(); }).filter(Boolean) : [];
const managerOptions = itemsState.teamUsers.map(function (u) {
return `<option value="${escapeHtml(u.name)}" ${item && item.manager === u.name ? 'selected' : ''}>${escapeHtml(u.name)}</option>`;
}).join('');
const overlay = document.createElement('div');
overlay.className = 'item-form-overlay';
overlay.id = 'item-form-overlay';
overlay.innerHTML = `
<div class="item-form-card">
<div class="item-form-head">
<div>📦 품목 ${item ? '수정' : '등록'}</div>
<span class="team-lead-badge">팀장 전용</span>
</div>
<div class="form-group">
<label class="form-label">고객사</label>
<div class="customer-search-wrap">
<input type="text" id="item-customer-input" class="form-input" placeholder="고객사명 검색 또는 입력" value="${item ? escapeHtml(item.customer) : ''}" oninput="onCustomerInput()" onblur="setTimeout(function(){ var b=document.getElementById('customer-suggestions'); if(b) b.style.display='none'; }, 200)" autocomplete="off">
<div id="customer-suggestions" class="customer-suggestions" style="display:none;"></div>
</div>
</div>
<div class="form-group">
<label class="form-label">품목명</label>
<input type="text" id="item-name-input" class="form-input" placeholder="예: 산업용 고무장갑" value="${item ? escapeHtml(item.itemName) : ''}" oninput="onItemNameChange()">
</div>
<div class="form-row">
<div class="form-group">
<label class="form-label">담당</label>
<select id="item-manager-select" class="form-input">${managerOptions}</select>
</div>
<div class="form-group">
<label class="form-label">팀 / 지역</label>
<input type="text" id="item-team-input" class="form-input" value="${escapeHtml(session.team || '')}" disabled>
</div>
</div>
<div class="form-group">
<label class="form-label">주요 원자재 (한글)</label>
<div id="material-tags" class="material-tags"></div>
<button type="button" class="ai-suggest-btn" onclick="suggestMaterialsForForm()">✨ AI 추천 다시 받기</button>
<div class="form-hint">품목명을 바꾸면 자동으로 다시 추천됩니다</div>
</div>
<div class="form-group">
<label class="form-label">상태</label>
<label style="margin-right:16px;"><input type="radio" name="item-status" value="활성" ${!item || item.status === '활성' ? 'checked' : ''}> 활성</label>
<label><input type="radio" name="item-status" value="비활성" ${item && item.status === '비활성' ? 'checked' : ''}> 비활성</label>
</div>
<div class="item-form-actions">
<button class="btn-secondary" onclick="closeItemForm()">취소</button>
<button class="btn-primary" onclick="saveItemForm()">저장</button>
</div>
</div>
`;
document.body.appendChild(overlay);
renderMaterialTags();
}

function closeItemForm() {
const overlay = document.getElementById('item-form-overlay');
if (overlay) overlay.remove();
}

function renderMaterialTags() {
const wrap = document.getElementById('material-tags');
if (!wrap) return;
wrap.innerHTML = itemsState.selectedMaterials.map(function (m, i) {
return `<span class="material-tag">${escapeHtml(m)} <span class="material-tag-remove" onclick="removeMaterialTag(${i})">×</span></span>`;
}).join('');
}

function removeMaterialTag(i) {
itemsState.selectedMaterials.splice(i, 1);
renderMaterialTags();
}

let itemNameDebounceTimer = null;
function onItemNameChange() {
clearTimeout(itemNameDebounceTimer);
itemNameDebounceTimer = setTimeout(function () { suggestMaterialsForForm(); }, 800);
}

async function suggestMaterialsForForm() {
const nameInput = document.getElementById('item-name-input');
if (!nameInput) return;
const itemName = nameInput.value.trim();
if (!itemName) return;
try {
const res = await callApi('suggestMaterials', { itemName: itemName });
if (res.ok && res.materials) {
itemsState.selectedMaterials = res.materials;
renderMaterialTags();
}
} catch (e) {}
}

function onCustomerInput() {
const input = document.getElementById('item-customer-input');
const q = input.value.trim();
const box = document.getElementById('customer-suggestions');
if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }
const matches = itemsState.customers.filter(function (c) { return c.name.toLowerCase().includes(q.toLowerCase()); }).slice(0, 8);
const exact = itemsState.customers.some(function (c) { return c.name === q; });
let html = matches.map(function (c) {
return `<div class="customer-suggestion-item" onmousedown="selectCustomer('${escapeHtml(c.name).replace(/'/g, "\\'")}')">${escapeHtml(c.name)}</div>`;
}).join('');
if (!exact) {
html += `<div class="customer-suggestion-item add-new" onmousedown="addNewCustomer()">+ "${escapeHtml(q)}" 새 고객사로 추가</div>`;
}
box.innerHTML = html;
box.style.display = 'block';
}

function selectCustomer(name) {
document.getElementById('item-customer-input').value = name;
document.getElementById('customer-suggestions').style.display = 'none';
}

async function addNewCustomer() {
const input = document.getElementById('item-customer-input');
const q = input.value.trim();
if (!q) return;
try {
const res = await callApi('upsertCustomer', { name: q });
if (res.ok) {
itemsState.customers.push({ code: res.code, name: res.name, manager: '' });
selectCustomer(res.name);
} else {
alert('고객사 추가 실패: ' + (res.error || 'SERVER_ERROR'));
}
} catch (e) {
alert('네트워크 오류가 발생했어요.');
}
}

async function saveItemForm() {
const customer = document.getElementById('item-customer-input').value.trim();
const itemName = document.getElementById('item-name-input').value.trim();
const manager = document.getElementById('item-manager-select').value;
const status = document.querySelector('input[name="item-status"]:checked').value;
if (!customer || !itemName || !manager) {
alert('고객사, 품목명, 담당을 모두 입력해주세요.');
return;
}
const payload = {
itemId: itemsState.editingItemId || '',
customer: customer,
itemName: itemName,
manager: manager,
materials: itemsState.selectedMaterials.join(','),
status: status
};
try {
const res = await callApi('upsertItem', payload);
if (!res.ok) {
alert('저장 실패: ' + (res.error || 'SERVER_ERROR'));
return;
}
closeItemForm();
await loadItems();
} catch (e) {
alert('네트워크 오류가 발생했어요.');
}
}

function doLogout() {
  localStorage.removeItem('mro_session');
  window.location.href = 'index.html';
}
</script>
